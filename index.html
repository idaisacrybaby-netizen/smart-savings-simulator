<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>محاكي الادخار الذكي</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family: Tahoma;
background: linear-gradient(135deg,#0f172a,#1e293b);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.container{
background:#1e293b;
padding:40px;
border-radius:15px;
width:420px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h1{
text-align:center;
margin-bottom:25px;
}

label{
display:block;
margin-top:15px;
}

input{
width:100%;
padding:10px;
border-radius:8px;
border:none;
margin-top:5px;
}

button{
width:100%;
margin-top:20px;
padding:12px;
border:none;
border-radius:10px;
background:#38bdf8;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0ea5e9;
}

.result{
margin-top:20px;
font-size:18px;
}

canvas{
margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>محاكي الادخار الذكي</h1>

<label>الادخار الشهري</label>
<input type="number" id="monthly" value="4000">

<label>معدل الفائدة السنوي (%)</label>
<input type="number" id="rate" value="6">

<label>عدد السنوات</label>
<input type="number" id="years" value="3">

<label>معدل التضخم (%)</label>
<input type="number" id="inflation" value="3">

<button onclick="calculate()">احسب</button>

<div class="result" id="result"></div>

<canvas id="chart"></canvas>

</div>

<script>

function calculate(){

let monthly=parseFloat(document.getElementById("monthly").value);

let rate=parseFloat(document.getElementById("rate").value)/100/12;

let years=parseFloat(document.getElementById("years").value);

let inflation=parseFloat(document.getElementById("inflation").value)/100;

let months=years*12;

let fv=monthly*((Math.pow(1+rate,months)-1)/rate);

let realValue=fv/Math.pow(1+inflation,years);

let saved=monthly*months;

document.getElementById("result").innerHTML=

"القيمة المستقبلية: "+fv.toFixed(2)+
"<br>القيمة الحقيقية بعد التضخم: "+realValue.toFixed(2)+
"<br>إجمالي الادخار: "+saved.toFixed(2);

let labels=[];
let values=[];

for(let i=1;i<=years;i++){

let tempMonths=i*12;

let tempFV=monthly*((Math.pow(1+rate,tempMonths)-1)/rate);

labels.push("سنة "+i);

values.push(tempFV);

}

new Chart(document.getElementById("chart"),{

type:"line",

data:{
labels:labels,

datasets:[{
label:"نمو الادخار",
data:values
}]
}

});

}

</script>

</body>
</html>
